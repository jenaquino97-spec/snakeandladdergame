<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake & Ladder</title>

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:10px
}

h1{
color:white;
margin:10px 0;
font-size:28px;
}

#board{
display:grid;
grid-template-columns:repeat(10,34px);
grid-template-rows:repeat(10,34px);
border:4px solid gold;
background:white;
margin-bottom:15px
}

.square{
border:1px solid #ddd;
display:flex;
justify-content:center;
align-items:center;
font-size:9px;
position:relative
}

.player{
width:16px;
height:16px;
border-radius:50%;
position:absolute;
bottom:2px
}

.red{background:#ff4757;left:2px}
.blue{background:#3498db;right:2px}

.controls{
background:white;
padding:15px;
border-radius:10px;
width:250px;
text-align:center
}

#dice{
font-size:40px;
margin:10px
}

button{
padding:10px 20px;
cursor:pointer;
background:orange;
border:none;
border-radius:8px;
font-weight:bold
}

</style>
</head>

<body>

<h1>🐍 Snake & Ladder 🪜</h1>

<div id="board"></div>

<div class="controls">
<div id="status">Player 1 Turn</div>
<div id="dice">🎲</div>
<button id="rollBtn">Roll Dice</button>
</div>

<script>

const snakes={
16:6,47:26,49:11,56:53,62:19,64:60,87:24,93:73,95:75,98:78
}

const ladders={
1:38,4:14,9:31,21:42,28:84,36:44,51:67,71:91,80:100
}

let players=[
{id:1,pos:1,color:"red"},
{id:2,pos:1,color:"blue"}
]

let currentPlayer=0

const board=document.getElementById("board")
const dice=document.getElementById("dice")
const status=document.getElementById("status")
const btn=document.getElementById("rollBtn")

function createBoard(){

for(let row=0;row<10;row++){

let numbers=[]

for(let col=1;col<=10;col++){

let num=row*10+col
numbers.push(num)

}

if(row%2==1){
numbers.reverse()
}

numbers.forEach(n=>{

let sq=document.createElement("div")
sq.className="square"
sq.id="sq"+n
sq.innerText=n

board.prepend(sq)

})

}

render()

}

function render(){

document.querySelectorAll(".player").forEach(e=>e.remove())

players.forEach(p=>{

let sq=document.getElementById("sq"+p.pos)

let token=document.createElement("div")
token.className="player "+p.color

sq.appendChild(token)

})

}

function rollDice(){

let roll=Math.floor(Math.random()*6)+1

dice.innerText=roll

let player=players[currentPlayer]

if(player.pos+roll<=100){

player.pos+=roll

if(snakes[player.pos]){
player.pos=snakes[player.pos]
}

if(ladders[player.pos]){
player.pos=ladders[player.pos]
}

}

render()

if(player.pos==100){

status.innerText="🎉 Player "+player.id+" Wins!"
btn.disabled=true
return

}

currentPlayer=(currentPlayer+1)%2

status.innerText="Player "+players[currentPlayer].id+" Turn"

}

btn.addEventListener("click",rollDice)

createBoard()

</script>

</body>
</html>
